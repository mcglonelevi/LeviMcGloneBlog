<article class="page" itemscope itemtype="http://schema.org/WebPage">

  <header class="page-header">
    <h1 class="page-title" itemprop="name">{{ page.title | escape }}</h1>
  </header>

  <div class="page-content" itemprop="description">
    {{ content }}
  </div>

</article>
